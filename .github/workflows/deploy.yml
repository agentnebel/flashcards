name: CI / Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Secret auf Job-Ebene in eine env-Variable spiegeln, damit der Deploy-Schritt
    # per `if` prüfen kann, ob ein Token hinterlegt ist.
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Lint + Tests + Build validieren bei jedem Push (CI bleibt grün, auch ohne Cloudflare-Token).
      - run: npm run lint
      - run: npm test
      - run: npm run build

      # Auto-Deploy NUR, wenn ein Cloudflare-API-Token als Repo-Secret existiert.
      # Ohne Token wird der Schritt übersprungen statt fehlzuschlagen.
      # Secrets setzen: Repo → Settings → Secrets and variables → Actions
      #   CLOUDFLARE_API_TOKEN  (Workers/D1/R2-Schreibrechte)
      #   CLOUDFLARE_ACCOUNT_ID (160ce2ed549950c2f2bf191ab93b3e45)
      - name: Deploy Worker + Assets
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
